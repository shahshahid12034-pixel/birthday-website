<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Bro 🎉</title>

<style>
body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background: linear-gradient(to top, #ff9a9e, #fad0c4);
    overflow: hidden;
    text-align: center;
}

/* Title */
h1 {
    font-size: 3em;
    color: white;
    margin-top: 50px;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px white; }
    to { text-shadow: 0 0 25px yellow; }
}

/* Party Cone 🎩 */
.cone {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 60px;
}

/* Cake */
.cake {
    position: relative;
    margin: 50px auto;
    width: 200px;
    height: 150px;
    background: pink;
    border-radius: 10px;
}

.candle {
    width: 10px;
    height: 40px;
    background: white;
    position: absolute;
    top: -40px;
    left: 95px;
}

.flame {
    width: 10px;
    height: 10px;
    background: orange;
    border-radius: 50%;
    position: absolute;
    top: -10px;
    animation: flicker 0.3s infinite;
}

@keyframes flicker {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
}

/* Balloons */
.balloon {
    position: absolute;
    bottom: -100px;
    width: 40px;
    height: 50px;
    background: red;
    border-radius: 50%;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    from { transform: translateY(0); }
    to { transform: translateY(-120vh); }
}

/* Message */
.message {
    color: white;
    font-size: 1.2em;
    padding: 20px;
    animation: fadeIn 3s ease-in;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}
</style>
</head>

<body>

<img src="https://cdn-icons-png.flaticon.com/512/3468/3468379.png" class="cone">

<h1>🎉 Happy Birthday Bro 🎉</h1>

<div class="cake">
    <div class="candle">
        <div class="flame"></div>
    </div>
</div>

<div class="message">
    <p>Bro, you're not just a friend — you're family ❤️</p>
    <p>Thanks for all the crazy memories, laughs, and support.</p>
    <p>May your life be full of success, happiness, and unlimited biryani 🍗🔥</p>
    <p>Stay awesome and never change 😎</p>
</div>

<script>
// Create balloons
for (let i = 0; i < 20; i++) {
    let balloon = document.createElement("div");
    balloon.className = "balloon";
    balloon.style.left = Math.random() * 100 + "vw";
    balloon.style.background = `hsl(${Math.random()*360}, 70%, 60%)`;
    balloon.style.animationDuration = (4 + Math.random()*3) + "s";
    document.body.appendChild(balloon);
}
</script>

</body>
</html>
